# Secret pattern catalogue. Each entry is anchored to a vendor-specific prefix
# / charset / length so generic high-entropy strings in minified bundles do
# not produce false positives.
#
# `pattern`: Python regex applied to text content.
# `severity`: drives the SEC-001 finding's severity.
# `kvkk` / `gdpr`: relevant articles when the leak directly enables data exposure.
# `verifiable`: future-flag for active-mode verification (Phase 4+).

- id: google-maps-api-key
  label: Google Maps / Cloud API key
  pattern: 'AIza[0-9A-Za-z_-]{35}'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: aws-access-key-id
  label: AWS access key ID
  pattern: '\b(AKIA|ASIA)[0-9A-Z]{16}\b'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: aws-secret-access-key
  label: AWS secret access key (with context marker)
  pattern: '(?i)aws(.{0,20})?(secret|sk)[\s:=\"''-]{1,3}([A-Za-z0-9/+=]{40})'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: github-pat-classic
  label: GitHub classic personal access token
  pattern: '\bghp_[0-9A-Za-z]{36}\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: github-pat-fine-grained
  label: GitHub fine-grained personal access token
  pattern: '\bgithub_pat_[0-9A-Za-z_]{82}\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: github-app-token
  label: GitHub app installation token
  pattern: '\b(ghu|ghs)_[0-9A-Za-z]{36}\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: github-oauth-token
  label: GitHub OAuth access token
  pattern: '\bgho_[0-9A-Za-z]{36}\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: stripe-secret-live
  label: Stripe live secret key
  pattern: '\bsk_live_[0-9a-zA-Z]{24,}\b'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: stripe-restricted-live
  label: Stripe live restricted key
  pattern: '\brk_live_[0-9a-zA-Z]{24,}\b'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: slack-bot-token
  label: Slack bot/user token
  pattern: '\bxox[baprs]-[0-9]+-[0-9]+-[0-9]+-[a-fA-F0-9]+\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: slack-webhook
  label: Slack webhook URL
  pattern: 'https?://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]{20,}'
  severity: medium
  kvkk: []
  gdpr: []
  verifiable: false

- id: mapbox-secret-token
  label: Mapbox secret access token
  pattern: '\bsk\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]{20,}\b'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: mapbox-public-token
  label: Mapbox public access token
  pattern: '\bpk\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]{20,}\b'
  severity: low
  kvkk: []
  gdpr: []
  verifiable: false

- id: arcgis-token-url-param
  label: ArcGIS token in URL or source
  pattern: '[?&]token=[A-Za-z0-9_-]{32,}'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: jwt
  label: JWT (likely session / bearer token)
  pattern: '\beyJ[A-Za-z0-9_-]{8,}\.eyJ[A-Za-z0-9_-]{8,}\.[A-Za-z0-9_-]{8,}\b'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: generic-bearer
  label: Generic Bearer token (header form embedded in source)
  pattern: '(?i)\bauthorization\s*[:=]\s*["'']?\s*Bearer\s+[A-Za-z0-9._\-+/=]{20,}'
  severity: high
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false

- id: private-key-pem
  label: PEM-encoded private key
  pattern: '-----BEGIN (RSA|EC|OPENSSH|DSA|PRIVATE) PRIVATE KEY-----'
  severity: critical
  kvkk: ["m12"]
  gdpr: ["art32"]
  verifiable: false
