# KVKK / GDPR safe-transfer destinations.
#
# KVKK Madde 9 allows international transfer of personal data to countries the
# Personal Data Protection Authority (KVKK Kurulu) deems "adequate" or under
# explicit consent / contract. Turkey itself plus the EEA and the EU adequacy
# countries are the safest baseline; everything else triggers COMP-002.
#
# GDPR Chapter V uses a similar list — every EU/EEA member plus the European
# Commission's adequacy decisions (UK, Switzerland, Norway, Iceland,
# Liechtenstein, Andorra, Argentina, Canada (PIPEDA), Faroe Islands, Guernsey,
# Israel, Isle of Man, Japan, Jersey, New Zealand, South Korea, Switzerland,
# Uruguay, the UK).
#
# Country codes are ISO 3166-1 alpha-2.

kvkk_safe:
  - TR  # Türkiye
  - AT  # Austria
  - BE  # Belgium
  - BG  # Bulgaria
  - HR  # Croatia
